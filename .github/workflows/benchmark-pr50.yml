# TEMPORARY — PR #50 scaffolding, delete before merge.
#
# Records a github-actions benchmark data point *for this PR's code*
# (dispatch-mode comparison included) and pushes it back to this branch.
# benchmark.yml's `benchmark:record_pr` can't do this: it always branches
# off origin/main (pre-#64 code, no dispatch data), and `workflow_dispatch`
# only works for workflows that already exist on the default branch —
# hence a push trigger scoped to this branch.
#
# Loop guard: the recording commit carries "[benchmark-record]" in its
# message, and this job skips those pushes.
name: benchmark-pr50

on:
  push:
    branches:
      - issue-38/test-drive-the-falcon-fiber-blocking-claim-for-duc

permissions:
  contents: write

jobs:
  record:
    name: Record github-actions benchmark on this branch
    if: "!contains(github.event.head_commit.message, '[benchmark-record]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          ruby-version: '3.3.6'
          bundler-cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable as of 2026-06-30
        with:
          toolchain: '1.94.1'

      - name: Record benchmark and push to this branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bundle exec rake "benchmark:record"
          git add docs/benchmarks
          git commit -m "Record github-actions benchmark for PR #50 (post-#64 dispatch schema) [benchmark-record]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
