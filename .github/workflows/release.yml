name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: Run CI
    uses: ./.github/workflows/main.yml

  cross_gems:
    name: Cross-compile native gems
    needs: ci
    uses: ./.github/workflows/cross-gem.yml

  benchmark:
    name: Record GitHub Actions benchmark results and open a PR
    needs: ci
    uses: ./.github/workflows/benchmark.yml

  publish:
    name: Publish to RubyGems and create release
    needs: [ci, cross_gems]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.3.6'
          bundler-cache: true

      - name: Verify tag matches gem version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          gem_version="$(ruby -e 'require "./lib/duckling/version"; puts Duckling::VERSION')"
          if [ "$tag_version" != "$gem_version" ]; then
            echo "Tag v$tag_version does not match Duckling::VERSION ($gem_version)" >&2
            exit 1
          fi

      - name: Download native gems
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-gem-*
          path: pkg
          merge-multiple: true

      - name: Build source gem
        run: |
          mkdir -p pkg
          gem build duckling.gemspec
          mv duckling-*.gem pkg/

      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          for gem in pkg/*.gem; do
            gem push "$gem"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes || true
          gh release create "${{ github.ref_name }}" \
            pkg/*.gem \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Update CHANGELOG.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="changelog/${{ github.ref_name }}"
          git fetch origin main
          git checkout -b "$branch" origin/main

          version="${GITHUB_REF_NAME#v}"
          notes="$(gh release view "${{ github.ref_name }}" --json body -q .body)"

          VERSION="$version" NOTES="$notes" ruby -e '
            content = File.read("CHANGELOG.md")
            date = Time.now.strftime("%Y-%m-%d")
            entry = "## [#{ENV["VERSION"]}] - #{date}\n\n#{ENV["NOTES"]}\n\n"
            updated = content.sub("## [Unreleased]\n", "## [Unreleased]\n\n#{entry}")
            File.write("CHANGELOG.md", updated)
          '

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "Update CHANGELOG for ${{ github.ref_name }}"
          git push origin "$branch"

          gh pr create --base main --head "$branch" \
            --title "Update CHANGELOG for ${{ github.ref_name }}" \
            --body "Automated changelog entry for ${{ github.ref_name }}."
          gh pr merge "$branch" --auto --squash
