name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  ci:
    name: Run CI
    uses: ./.github/workflows/main.yml

  publish:
    name: Publish to RubyGems and create release
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.6'
          bundler-cache: true

      - name: Verify tag matches gem version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          gem_version="$(ruby -e 'require "./lib/duckling/version"; puts Duckling::VERSION')"
          if [ "$tag_version" != "$gem_version" ]; then
            echo "Tag v$tag_version does not match Duckling::VERSION ($gem_version)" >&2
            exit 1
          fi

      - name: Build gem
        run: gem build duckling.gemspec

      - name: Publish to RubyGems
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: gem push duckling-*.gem

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes || true
          gh release create "${{ github.ref_name }}" \
            duckling-*.gem \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Update CHANGELOG.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          version="${GITHUB_REF_NAME#v}"
          notes="$(gh release view "${{ github.ref_name }}" --json body -q .body)"

          VERSION="$version" NOTES="$notes" ruby -e '
            content = File.read("CHANGELOG.md")
            date = Time.now.strftime("%Y-%m-%d")
            entry = "## [#{ENV["VERSION"]}] - #{date}\n\n#{ENV["NOTES"]}\n\n"
            updated = content.sub("## [Unreleased]\n", "## [Unreleased]\n\n#{entry}")
            File.write("CHANGELOG.md", updated)
          '

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "Update CHANGELOG for ${{ github.ref_name }}"
          git push origin main
