# Records a github-actions benchmark data point *for a given branch's own
# code* and pushes it straight back to that branch, instead of branching off
# origin/main. Complements benchmark.yml's `benchmark:record_pr`, which
# always branches off origin/main (so it can't capture code that only exists
# on an unmerged PR branch) and opens a fresh PR rather than committing to
# the branch that's already open.
#
# Manually dispatched only — run via:
#   gh workflow run benchmark-branch.yml --ref <branch> [-f pr_number=<n>]
# Note: like any workflow_dispatch workflow, this must already exist on the
# default branch before GitHub will let you dispatch it against another ref.
name: benchmark-branch

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number this branch belongs to (used in the commit message; optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  record:
    name: Record github-actions benchmark on this branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.3.6'
          bundler-cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable as of 2026-06-30
        with:
          toolchain: '1.94.1'

      - name: Record benchmark and push to this branch
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bundle exec rake "benchmark:record"
          git add docs/benchmarks
          label="${PR_NUMBER:+PR #$PR_NUMBER }branch ${GITHUB_REF_NAME}"
          git commit -m "Record github-actions benchmark for ${label} [benchmark-record]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
