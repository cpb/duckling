name: cross-gem

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross_gems:
    name: Cross-compile native gem (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [x86_64-linux, x86_64-darwin]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.3.6'
          bundler-cache: true

      - name: Cross-compile native gem
        uses: oxidize-rb/actions/cross-gem@e5f9a49a7812a078584072f6e3f657ad247c8771 # v1.4.4
        id: cross-gem
        with:
          platform: ${{ matrix.platform }}
          # duckling.gemspec requires Ruby >= 3.2.0, and ext/duckling/Cargo.toml
          # builds against rb-sys's stable-api-compiled-fallback feature, so a
          # single binary compiled against the 3.2 floor runs unmodified on
          # every later Ruby minor version (no per-Ruby-version fat gem needed).
          ruby-versions: "3.2"

      - name: Upload native gem artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-gem-${{ matrix.platform }}
          path: ${{ steps.cross-gem.outputs.gem-path }}
          if-no-files-found: error
